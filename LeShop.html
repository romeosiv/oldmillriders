<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Le Shop - Old Mill Riders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./moulin-coeur-noir.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ---------- Reset & Base ---------- */
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #e5e5e5;
      margin: 0;
      color: #000;
    }
    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ---------- HEADER (CORRIGÉ POUR ÉVITER LE CHEVAUCHEMENT) ---------- */
    header {
      background-color: #000;
      color: white;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px auto;
      max-width: 1024px;
      box-sizing: border-box;
      gap: 10px;
    }
    .header-left, .header-right {
      display: flex;
      align-items: center;
      flex: 1;
    }
    .header-right { justify-content: flex-end; }
    
    .center-title {
      flex: 2;
      text-align: center;
      font-size: 1.6rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .center-title a { color: inherit; text-decoration: none; }

    nav { display: flex; align-items: center; gap: 1.5rem; }
    nav a { position: relative; color: white; text-decoration: none; font-size: 1rem; }
    nav a:hover::after, nav a.active::after { width: 100%; }
    nav a::after { content: ""; position: absolute; left: 0; bottom: -2px; width: 0; height: 1px; background: white; transition: width 0.3s ease; }
    
    .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; color: white; cursor: pointer; }
    .icon { width: 28px; height: 28px; }
    .insta-icon { width: 18px; height: 18px; display: block; }

    /* ---------- HERO & PHILO ---------- */
    .hero {
      background-image: image-set(url('./shop-desktop.jpg') 1x, url('./shop-desktop@2x.jpg') 2x);
      background-size: cover; background-position: center; filter: grayscale(100%);
      border-radius: 20px; margin-bottom: 20px; aspect-ratio: 1024/350; position: relative;
    }
    .hero-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 3rem; text-align: center; }
    .about-block { background-color: #000; color: white; padding: 2rem; border-radius: 20px; margin-bottom: 20px; text-align: center; line-height: 1.5; }

    /* ---------- GRILLE DE PRODUITS ---------- */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .product-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
      text-align: center;
      padding-bottom: 1.5rem;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .product-card h3 { margin: 1rem 0 0.5rem; }

    /* ---------- MODAL PRODUIT ---------- */
    .product-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .modal-shop-content {
      background: white;
      width: 100%;
      max-width: 900px;
      max-height: 85vh;
      border-radius: 20px;
      position: relative;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      padding: 2rem;
      gap: 2rem;
    }
    .close-shop { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; z-index: 10; }

    .image-block { flex: 1; display: flex; flex-direction: column; }
    .carousel-main { width: 100%; max-height: 55vh; border-radius: 15px; object-fit: contain; background: #f9f9f9; }
    .thumbnails { margin-top: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .thumbnails img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
    .thumbnails img.active { border-color: black; }
    
    .info-block { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-right: 10px; }
    .preorder-button {
      background-color: white; color: black; border: 2px solid black;
      border-radius: 999px; padding: 0.8rem 1.5rem; font-weight: bold;
      box-shadow: 4px 4px 0 black; cursor: pointer; transition: 0.2s;
      margin-top: auto;
    }
    .preorder-button:hover { transform: translate(2px, 2px); box-shadow: none; }

    /* ---------- MOBILE FIXES ---------- */
    @media (max-width: 768px) {
      header { padding: 0.8rem 1rem; }
      .header-left nav { display: none; }
      .menu-toggle { display: block; }
      .center-title { font-size: 1.2rem; flex: 3; }
      .header-left, .header-right { flex: 1; }
      
      nav.open { 
        display: flex; flex-direction: column; position: absolute; 
        top: 100%; left: 0; right: 0; background: #000; padding: 1rem; 
        border-radius: 0 0 20px 20px; z-index: 100;
      }

      .modal-shop-content {
        flex-direction: column;
        max-height: 92vh;
        overflow-y: auto;
        padding: 1.2rem;
      }
      .carousel-main { max-height: 35vh; }
      .info-block { overflow-y: visible; text-align: center; }
      .preorder-button { width: 100%; align-self: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-left">
      <a href="home.html" class="logo"><img src="./moulin-coeur-blanc.png" class="icon" alt="Logo"></a>
      <button class="menu-toggle">☰</button>
      <nav>
        <a href="labande.html">La Bande</a>
        <a href="LeShop.html" class="active">Le Shop</a>
        <a href="trips.html">Trips</a>
      </nav>
    </div>
    <div class="center-title"><a href="home.html">Old Mill Riders</a></div>
    <div class="header-right">
      <a href="https://www.instagram.com/old_mill_riders/" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" class="insta-icon" alt="Instagram">
      </a>
    </div>
  </header>

  <div class="hero"><div class="hero-text">Portez l’aventure</div></div>

  <div class="about-block">
    Éditions limitées. Amenez l’aventure avec vous !
  </div>

  <div class="products-grid">
    <div class="product-card" onclick="openShopModal('modal-tshirt')">
      <img src="./5W9A4780-HDR.jpg" alt="T-shirt">
      <h3>T-shirt</h3>
      <p>30 €</p>
    </div>
    <div class="product-card" onclick="openShopModal('modal-tourdecou')">
      <img src="./tourdecoucasque.JPEG" alt="Tour de cou">
      <h3>Tour de cou</h3>
      <p>17 €</p>
    </div>
  </div>

  <div id="preorder-form" style="display:none; background:white; padding:2rem; border-radius:20px;">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeWCsgR-2JmqIF3gpvUY6dFdYXxhUgeDT7Bw0baK5dUGDgXwg/viewform?embedded=true" width="100%" height="800" frameborder="0">Chargement…</iframe>
  </div>
</div>

<div id="modal-tshirt" class="product-modal">
  <div class="modal-shop-content">
    <span class="close-shop" onclick="closeShopModal('modal-tshirt')">&times;</span>
    <div class="image-block">
      <img src="./5W9A4780-HDR.jpg" class="carousel-main" id="main-tshirt">
      <div class="thumbnails">
        <img src="./5W9A4780-HDR.jpg" class="active" onclick="changeImg('main-tshirt', this)">
        <img src="./5W9A4657.jpg" onclick="changeImg('main-tshirt', this)">
      </div>
    </div>
    <div class="info-block">
      <h2>T-shirt Old Mill</h2>
      <p>Coton 100% bio. Réalisé avec Cin&Quanon.</p>
      <button class="preorder-button" onclick="goToPreorder()">Pré-commander</button>
    </div>
  </div>
</div>

<div id="modal-tourdecou" class="product-modal">
  <div class="modal-shop-content">
    <span class="close-shop" onclick="closeShopModal('modal-tourdecou')">&times;</span>
    <div class="image-block">
      <img src="./tourdecoucasque.JPEG" class="carousel-main" id="main-neck">
      <div class="thumbnails">
        <img src="./tourdecoucasque.JPEG" class="active" onclick="changeImg('main-neck', this)">
        <img src="./tourdecou.JPEG" onclick="changeImg('main-neck', this)">
      </div>
    </div>
    <div class="info-block">
      <h2>Tour de cou</h2>
      <p>Respirant et confortable.</p>
      <button class="preorder-button" onclick="goToPreorder()">Pré-commander</button>
    </div>
  </div>
</div>

<script>
  function openShopModal(id) {
    document.getElementById(id).style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
  }
  function closeShopModal(id) {
    document.getElementById(id).style.display = 'none';
    document.body.style.overflow = 'auto';
  }
  function changeImg(mainId, thumb) {
    document.getElementById(mainId).src = thumb.src;
    thumb.parentElement.querySelectorAll('img').forEach(i => i.classList.remove('active'));
    thumb.classList.add('active');
  }
  function goToPreorder() {
    document.querySelectorAll('.product-modal').forEach(m => m.style.display = 'none');
    document.body.style.overflow = 'auto';
    const f = document.getElementById('preorder-form');
    f.style.display = 'block';
    f.scrollIntoView({ behavior: 'smooth' });
  }
  document.querySelector('.menu-toggle').onclick = () => {
    document.querySelector('nav').classList.toggle('open');
  };
</script>
</body>
</html>
